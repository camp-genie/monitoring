owner: camp-genie
repo: monitoring
user-agent: camp-genie

sites:
  - name: Camp Genie Web - Live
    url: https://app.thisiscampgenie.com/api/health/live
  - name: Camp Genie Web - Ready
    url: https://app.thisiscampgenie.com/api/health/ready
    headers:
      - "Authorization: Bearer $MONITORING_SECRET"
  - name: Camp Genie Web - Monitoring Admin Portal
    url: https://app.thisiscampgenie.com/api/monitoring/admin-portal
    headers:
      - "Authorization: Bearer $MONITORING_SECRET"
  - name: Camp Genie Web - Monitoring Bookings
    url: https://app.thisiscampgenie.com/api/monitoring/bookings
    headers:
      - "Authorization: Bearer $MONITORING_SECRET"
  - name: Camp Genie Web - Monitoring Stripe Webhooks
    url: https://app.thisiscampgenie.com/api/monitoring/stripe-webhooks
    headers:
      - "Authorization: Bearer $MONITORING_SECRET"
  - name: Camp Genie Admin - Health
    url: https://admin.thisiscampgenie.com/healthz.json

status-website:
  baseUrl: /monitoring
  logoUrl: https://www.thisiscampgenie.com/favicon.ico
  name: Camp Genie Monitoring
  introTitle: "Camp Genie uptime and monitoring"
  introMessage: Uptime checks for Camp Genie web and admin health endpoints.
  navbar:
    - title: Status
      href: /
    - title: Main Site
      href: https://www.thisiscampgenie.com
    - title: GitHub
      href: https://github.com/$OWNER/$REPO
